<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS Crossing</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="hud">
      <p><strong>WASD</strong> or <strong>arrow keys</strong> move · <strong>Shift</strong> sprint</p>
      <div id="inventory">
        <p>Rocks: <span id="inventory-rocks">0</span></p>
        <p>Wood: <span id="inventory-wood">0</span></p>
        <div id="inventory-notes">
          <p>Notes: <span id="inventory-notes-empty">none</span></p>
          <ul id="inventory-notes-list"></ul>
        </div>
      </div>
    </div>
    <div id="note-panel" hidden>
      <p id="note-text"></p>
      <p id="note-dismiss">Press <strong>Space</strong> or <strong>Escape</strong> to close</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
